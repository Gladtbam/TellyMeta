<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>个人中心</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #fff);
            --text-color: var(--tg-theme-text-color, #000);
            --hint-color: var(--tg-theme-hint-color, #999);
            --link-color: var(--tg-theme-link-color, #2481cc);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #fff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --destructive-text-color: var(--tg-theme-destructive-text-color, #ff3b30);
            --section-header-text-color: var(--tg-theme-section-header-text-color, #6d6d72);
        }

        body {
            background-color: var(--secondary-bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            padding: 16px;
            padding-bottom: 20px;
        }

        .section-title {
            font-size: 13px;
            color: var(--section-header-text-color);
            text-transform: uppercase;
            margin: 24px 0 8px 16px;
        }

        .section-title:first-child {
            margin-top: 8px;
        }

        .card {
            background-color: var(--bg-color);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--secondary-bg-color);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .item-title {
            font-size: 17px;
            font-weight: 400;
        }

        .item-subtitle {
            font-size: 14px;
            color: var(--hint-color);
            margin-top: 4px;
            word-break: break-all;
        }

        .item-value {
            font-size: 17px;
            color: var(--hint-color);
        }

        .profile-header {
            display: flex;
            align-items: center;
            padding: 24px 20px;
            background: var(--bg-color);
            margin-bottom: 10px;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--secondary-bg-color);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 14px;
            color: var(--hint-color);
        }

        .tag-type {
            font-size: 11px;
            color: var(--text-color);
            background: var(--secondary-bg-color);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: var(--hint-color);
            font-size: 14px;
        }

        .profile-actions {
            margin-left: auto;
        }

        .settings-btn {
            font-size: 24px;
            color: var(--link-color);
            cursor: pointer;
            padding: 10px;
            display: none;
            /* 默认隐藏 */
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--button-color);
            color: var(--button-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .action-btn:active {
            opacity: 0.6;
        }

        .nsfw-btn {
            border-color: var(--destructive-text-color);
            color: var(--destructive-text-color);
        }

        .signup-btn {
            background: var(--button-color);
            color: var(--button-text-color);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .signup-btn:active {
            opacity: 0.6;
        }

        .signup-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .signup-btn-secondary {
            background: transparent;
            color: var(--hint-color);
            border: 1px solid var(--hint-color);
        }

        .status-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .status-tag.open {
            color: #34c759;
            background: rgba(52, 199, 89, 0.1);
        }

        .status-tag.closed {
            color: var(--hint-color);
            background: var(--secondary-bg-color);
        }

        .status-tag.score {
            color: var(--link-color);
            background: rgba(36, 129, 204, 0.1);
        }

        .reason-text {
            font-size: 13px;
            color: var(--hint-color);
            padding: 8px 16px 12px;
            text-align: center;
        }

        .tos-text {
            font-size: 13px;
            color: var(--hint-color);
            padding: 8px 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            border-top: 0.5px solid var(--secondary-bg-color);
        }

        .external-input-wrap {
            padding: 8px 16px 12px;
        }

        .external-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--hint-color);
            border-radius: 8px;
            font-size: 15px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }

        .external-input:focus {
            border-color: var(--button-color);
        }

        .external-input::placeholder {
            color: var(--hint-color);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar">👤</div>
            <div class="profile-info">
                <div class="profile-name" id="user-name">加载中...</div>
                <div class="profile-id" id="user-id"></div>
            </div>
            <div class="profile-actions">
                <div class="settings-btn" id="settings-btn" onclick="goToSettings()">⚙️</div>
            </div>
        </div>

        <div class="container">
            <div class="section-title">账户状态</div>
            <div class="card">
                <div class="item">
                    <div class="item-content"><span class="item-title">当前积分</span></div>
                    <span class="item-value" id="score">-</span>
                </div>
                <div class="item">
                    <div class="item-content"><span class="item-title">连续签到</span></div>
                    <span class="item-value" id="checkin">-</span>
                </div>
                <div class="item">
                    <div class="item-content"><span class="item-title">警告次数</span></div>
                    <span class="item-value" id="warning">-</span>
                </div>
                <div class="item">
                    <div class="item-content"><span class="item-title">续期/注册积分</span></div>
                    <span class="item-value" id="renew-score">-</span>
                </div>
            </div>

            <div class="section-title">兑换码</div>
            <div class="card">
                <div style="padding: 12px 16px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="text" class="external-input" id="redeem-code-input" placeholder="请输入注册码 / 续期码"
                            style="flex: 1;">
                        <button class="signup-btn" id="redeem-code-btn" onclick="redeemCode()"
                            style="width: auto; padding: 10px 20px; white-space: nowrap;">兑换</button>
                    </div>
                </div>
            </div>

            <div class="section-title" id="media-title">媒体账户</div>
            <div id="media-list">
                <div class="loader">正在加载账户信息...</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 适配主题色
        function applyTheme() {
            const p = tg.themeParams;
            const root = document.documentElement;
            if (p.bg_color) root.style.setProperty('--tg-theme-bg-color', p.bg_color);
            if (p.text_color) root.style.setProperty('--tg-theme-text-color', p.text_color);
            if (p.hint_color) root.style.setProperty('--tg-theme-hint-color', p.hint_color);
            if (p.link_color) root.style.setProperty('--tg-theme-link-color', p.link_color);
            if (p.button_color) root.style.setProperty('--tg-theme-button-color', p.button_color);
            if (p.button_text_color) root.style.setProperty('--tg-theme-button-text-color', p.button_text_color);
            if (p.secondary_bg_color) root.style.setProperty('--tg-theme-secondary-bg-color', p.secondary_bg_color);
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        tg.expand();

        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            tg.close();
        });

        // ... (user init) ...
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-name').innerText = [user.first_name, user.last_name].filter(Boolean).join(' ');
            document.getElementById('user-id').innerText = `ID: ${user.id}`;
        }

        let _appData = null;

        async function fetchMe() {
            try {
                const res = await fetch('/api/miniapp/me', {
                    headers: { 'X-Telegram-Init-Data': tg.initData }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "加载失败");
                }

                const data = await res.json();
                _appData = data;
                render(data);
            } catch (e) {
                document.getElementById('media-list').innerHTML = `<div class="loader" style="color:var(--destructive-text-color)">${e.message}</div>`;
                tg.showAlert(e.message);
            }
        }

        function render(data) {
            const user = tg.initDataUnsafe.user;
            if (user && user.photo_url) {
                document.getElementById('avatar').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%">`;
            }

            // 管理员入口
            if (data.is_admin) {
                document.getElementById('settings-btn').style.display = 'block';
            }

            document.getElementById('score').innerText = data.score;
            document.getElementById('renew-score').innerText = data.renew_score;
            document.getElementById('checkin').innerText = `${data.checkin_count} 天`;
            document.getElementById('warning').innerText = data.warning_count;

            const list = document.getElementById('media-list');
            list.innerHTML = '';

            // 已注册的媒体账户
            if (data.media_accounts && data.media_accounts.length > 0) {
                data.media_accounts.forEach(acc => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const statusColor = acc.is_banned ? 'var(--destructive-text-color)' : '#34c759';
                    let expiry = "未知";
                    if (acc.expires_at) {
                        const d = new Date(acc.expires_at);
                        expiry = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
                    }

                    card.innerHTML = `
                        <div class="item">
                            <div class="item-content">
                                <span class="item-title">${acc.server_name} <span class="tag-type">${acc.server_type}</span></span>
                                <span class="item-subtitle">${acc.server_url}</span>
                            </div>
                            <span style="font-size:13px; color:${statusColor}">${acc.status_text}</span>
                        </div>
                        <div class="item">
                            <div class="item-content"><span class="item-subtitle">媒体用户名</span></div>
                            <span class="item-value" style="font-size:15px">${acc.media_name}</span>
                        </div>
                        <div class="item">
                            <div class="item-content"><span class="item-subtitle">有效期至</span></div>
                            <span class="item-value" style="font-size:15px">${expiry}</span>
                        </div>
                        <div class="item" style="cursor:pointer" onclick="window.location.href='account.html?server_id=${acc.server_id}'">
                            <div class="item-content"><span class="item-subtitle">操作</span></div>
                            <span class="item-value" style="font-size:15px; color:var(--link-color)">管理 ›</span>
                        </div>
                     `;
                    list.appendChild(card);
                });
            }

            // 可注册的服务器
            const availableServers = data.available_servers || [];
            if (availableServers.length > 0) {
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.textContent = '可注册的媒体服务';
                list.appendChild(sectionTitle);

                availableServers.forEach(srv => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `signup-card-${srv.server_id}`;

                    // 状态标签样式
                    let tagClass = 'closed';
                    if (srv.can_register) {
                        tagClass = srv.registration_mode === 'default' ? 'score' : 'open';
                    }

                    let cardHTML = `
                        <div class="item">
                            <div class="item-content">
                                <span class="item-title">${srv.server_name} <span class="tag-type">${srv.server_type}</span></span>
                            </div>
                            <span class="status-tag ${tagClass}">${srv.status_label}</span>
                        </div>
                    `;

                    if (srv.tos) {
                        cardHTML += `<div class="tos-text">📜 用户协议\n\n${escapeHtml(srv.tos)}</div>`;
                    }

                    if (srv.can_register) {
                        // 前置条件检查：群组成员 + 用户名
                        if (!data.is_group_member) {
                            cardHTML += `<div class="reason-text">⚠️ 请先加入群组后再注册</div>`;
                        } else if (!data.has_username) {
                            cardHTML += `<div class="reason-text">⚠️ 请先设置 Telegram 用户名</div>`;
                        } else {
                            if (srv.has_external_verification) {
                                cardHTML += `
                                    <div class="external-input-wrap">
                                        <input type="text" class="external-input" id="verify-input-${srv.server_id}"
                                               placeholder="请输入验证字符串（验证码/邀请链接后缀）">
                                    </div>
                                `;
                            }

                            cardHTML += `
                                <div style="padding: 8px 16px 14px;">
                                    <button class="signup-btn" id="signup-btn-${srv.server_id}"
                                            onclick="doSignup(${srv.server_id}, ${srv.has_external_verification})">
                                        ${srv.tos ? '同意协议并注册' : '立即注册'}
                                    </button>
                                </div>
                            `;
                        }
                    } else {
                        if (srv.reason) {
                            cardHTML += `<div class="reason-text">${srv.reason}</div>`;
                        }
                    }

                    card.innerHTML = cardHTML;
                    list.appendChild(card);
                });
            }

            if ((!data.media_accounts || data.media_accounts.length === 0) && availableServers.length === 0) {
                list.innerHTML = '<div class="card"><div class="item" style="justify-content:center; color:var(--hint-color)">暂无可用的媒体服务器</div></div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function doSignup(serverId, hasExternalVerification) {
            const btn = document.getElementById(`signup-btn-${serverId}`);
            if (!btn) return;

            let verificationInput = '';
            if (hasExternalVerification) {
                const input = document.getElementById(`verify-input-${serverId}`);
                if (input) {
                    verificationInput = input.value.trim();
                }
                if (!verificationInput) {
                    tg.showAlert('请输入验证字符串');
                    return;
                }
            }

            if (!confirm('确认要注册该服务器的账户吗？')) return;

            btn.disabled = true;
            btn.textContent = '正在注册...';

            try {
                const params = new URLSearchParams();
                if (verificationInput) {
                    params.set('verification_input', verificationInput);
                }
                const qs = params.toString() ? `?${params.toString()}` : '';

                const res = await fetch(`/api/miniapp/signup/${serverId}${qs}`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': tg.initData }
                });

                const data = await res.json();

                if (data.success) {
                    tg.showAlert(data.message, () => {
                        fetchMe();
                    });
                } else {
                    tg.showAlert(data.detail || data.message || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '立即注册';
                }
            } catch (e) {
                tg.showAlert(`请求错误: ${e.message}`);
                btn.disabled = false;
                btn.textContent = '立即注册';
            }
        }

        async function redeemCode() {
            const input = document.getElementById('redeem-code-input');
            const btn = document.getElementById('redeem-code-btn');
            const code = input.value.trim();

            if (!code) {
                tg.showAlert('请输入兑换码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '兑换中...';

            try {
                const params = new URLSearchParams({ code });
                const res = await fetch(`/api/miniapp/redeem_code?${params.toString()}`, {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': tg.initData }
                });

                const data = await res.json();

                if (data.success) {
                    input.value = '';
                    tg.showAlert(data.message, () => {
                        fetchMe(); // 刷新页面数据
                    });
                } else {
                    tg.showAlert(data.detail || data.message || '兑换失败');
                }
            } catch (e) {
                tg.showAlert(`请求错误: ${e.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '兑换';
            }
        }

        function goToSettings() {
            window.location.href = "settings.html";
        }

        fetchMe();
    </script>
</body>

</html>
